name: Deploy Alameda Italian app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "alameda-italian/**"
      - ".github/workflows/deploy-alameda-italian.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site (alameda-italian as root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "alameda-italian"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
